<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Workout Tracker</title>
<style>
:root {
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-input: #0f172a;
  --bg-soft: #1a2438;
  --border: #334155;
  --border-soft: #1e293b;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --primary: #3b82f6;
  --primary-bg: rgba(59,130,246,0.15);
  --success: #22c55e;
  --success-bg: rgba(34,197,94,0.15);
  --warning: #f59e0b;
  --warning-bg: rgba(245,158,11,0.15);
  --danger: #ef4444;
  --danger-bg: rgba(239,68,68,0.15);
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding-bottom: env(safe-area-inset-bottom);
  font-size: 14px; line-height: 1.4;
}
.container { max-width: 720px; margin: 0 auto; padding: 16px; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.title { font-size: 18px; font-weight: 600; color: #f8fafc; }
.subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

.tabs { display: flex; gap: 4px; background: var(--bg-card); padding: 4px; border-radius: var(--radius); }
.tab-btn {
  flex: 1; padding: 8px 12px; border: none; background: transparent;
  color: var(--text-muted); font-size: 13px; font-weight: 500;
  cursor: pointer; border-radius: var(--radius-sm); font-family: inherit;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--primary); color: white; }

.card { background: var(--bg-card); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.card-tight { padding: 10px 14px; }

.selector { display: flex; gap: 20px; flex-wrap: wrap; }
.selector-label {
  font-size: 10px; color: var(--text-dim); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
}
.btn-row { display: flex; gap: 4px; flex-wrap: wrap; }

.wk-btn {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); font-size: 12px; cursor: pointer;
  font-weight: 600; font-family: inherit;
}
.wk-btn:hover { border-color: var(--primary); color: var(--text); }
.wk-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.wk-btn.logged { color: var(--success); border-color: var(--success); }
.wk-btn.active.logged { background: var(--success); color: white; }
.wk-btn.add { border-style: dashed; color: var(--primary); border-color: var(--primary); }

.day-btn {
  padding: 6px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); font-size: 13px; cursor: pointer;
  font-weight: 600; font-family: inherit;
}
.day-btn:hover { border-color: var(--primary); color: var(--text); }
.day-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.day-btn.logged { color: var(--success); border-color: var(--success); }
.day-btn.active.logged { background: var(--success); color: white; }
.day-btn.skipped { color: var(--text-dim); border-color: var(--text-dim); opacity: 0.7; text-decoration: line-through; }
.day-btn.active.skipped { background: var(--text-dim); color: white; opacity: 1; }

.session-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px; gap: 10px; flex-wrap: wrap;
}
.session-title { font-size: 16px; font-weight: 600; }
.session-subtitle { font-size: 13px; color: var(--primary); margin-left: 8px; font-weight: 500; }
.session-meta { display: flex; align-items: center; gap: 8px; }
.skip-btn {
  padding: 4px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 12px; cursor: pointer;
  font-family: inherit; font-weight: 500;
}
.skip-btn:hover { border-color: var(--warning); color: var(--warning); }
.saved-badge { font-size: 12px; color: var(--success); display: none; align-items: center; gap: 4px; }
.saved-badge.show { display: inline-flex; }

.skipped-notice {
  background: var(--bg-soft); border: 1px dashed var(--text-dim);
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
  font-size: 13px; color: var(--text-muted);
}
.skipped-notice strong { color: var(--text); }

.bw-card { display: flex; align-items: center; gap: 12px; }
.bw-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
.num-inp {
  padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-input); color: var(--text); font-size: 14px;
  text-align: center; font-family: inherit; width: 100%; font-weight: 500;
  transition: border-color 0.1s;
}
.num-inp:focus { outline: none; border-color: var(--primary); }
.bw-inp { width: 80px; }

.ex-name { font-size: 14px; font-weight: 600; color: #f8fafc; }
.ex-target { font-size: 11px; color: var(--text-dim); font-weight: 500; }
.ex-tip {
  font-size: 11px; color: var(--text-muted); padding: 6px 10px;
  background: var(--bg-soft); border-radius: var(--radius-sm);
  border-left: 2px solid var(--primary); margin: 8px 0;
}

.rec {
  border-radius: var(--radius-sm); padding: 8px 10px;
  font-size: 12px; display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; margin: 8px 0 6px;
}
.rec-up { background: var(--success-bg); border: 1px solid var(--success); color: var(--success); }
.rec-stay { background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-muted); }
.rec-hard { background: var(--warning-bg); border: 1px solid var(--warning); color: var(--warning); }
.rec-down { background: var(--warning-bg); border: 1px solid var(--warning); color: var(--warning); }
.rec-in-range { background: var(--primary-bg); border: 1px solid var(--primary); color: var(--primary); }
.rec-stale { background: var(--bg-soft); border: 1px dashed var(--text-dim); color: var(--text-dim); }
.rec-text { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; }
.rec strong { font-weight: 600; }
.apply-btn {
  padding: 4px 10px; border-radius: var(--radius-sm);
  border: 1px solid currentColor; background: transparent;
  color: inherit; font-size: 11px; cursor: pointer;
  font-family: inherit; font-weight: 600;
}
.apply-btn:hover { background: currentColor; }
.apply-btn:hover { color: var(--bg) !important; }
.apply-btn:active { transform: scale(0.97); }
.last-row {
  font-size: 11px; color: var(--text-dim); margin-bottom: 10px;
  padding: 0 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}

.set-grid-head, .set-grid-row {
  display: grid; gap: 6px; align-items: center; margin-bottom: 5px;
}
.set-grid-head { margin-bottom: 6px; }
.gh { font-size: 10px; color: var(--text-dim); text-align: center; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.set-num { text-align: center; font-size: 13px; color: var(--text-dim); font-weight: 600; }

.reps-cell { position: relative; display: flex; align-items: center; gap: 4px; }
.reps-cell .num-inp { flex: 1; min-width: 0; }
.reps-delta {
  font-size: 11px; font-weight: 600; min-width: 26px; text-align: left;
}
.reps-delta.up { color: var(--success); }
.reps-delta.down { color: var(--warning); }

.feel-group { display: flex; gap: 3px; justify-content: stretch; }
.pill {
  flex: 1; height: 32px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); font-size: 12px;
  cursor: pointer; font-weight: 600; font-family: inherit;
  background: transparent; color: var(--text-muted);
  transition: all 0.1s; -webkit-tap-highlight-color: transparent;
}
.pill:active { transform: scale(0.95); }
.pill.sel-e { background: var(--success); color: white; border-color: var(--success); }
.pill.sel-m { background: var(--warning); color: white; border-color: var(--warning); }
.pill.sel-h { background: var(--danger); color: white; border-color: var(--danger); }

.feel-mini {
  display: inline-block; width: 16px; height: 16px;
  border-radius: 3px; font-size: 9px; line-height: 16px;
  text-align: center; font-weight: 700; margin: 0 1px;
}
.fm-e { background: var(--success); color: white; }
.fm-m { background: var(--warning); color: white; }
.fm-h { background: var(--danger); color: white; }
.fm-o { background: var(--bg-input); color: var(--text-dim); border: 1px solid var(--border); }

.volume-card {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-soft); border-radius: var(--radius); padding: 12px 16px;
  margin-bottom: 10px;
}
.volume-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.volume-value { font-size: 22px; font-weight: 700; color: var(--text); }
.volume-delta { font-size: 12px; font-weight: 600; }
.volume-delta.up { color: var(--success); }
.volume-delta.down { color: var(--warning); }
.volume-delta.same { color: var(--text-dim); }

.save-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  border: none; background: var(--primary); color: white;
  font-size: 15px; font-weight: 600; cursor: pointer;
  margin-top: 8px; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  -webkit-tap-highlight-color: transparent;
}
.save-btn:hover { opacity: 0.9; }
.save-btn:active { transform: scale(0.99); }
.save-btn.saved { background: var(--success); }
.save-btn.err { background: var(--danger); }

select {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-input); color: var(--text); font-size: 13px; font-family: inherit;
}

.mode-toggle {
  display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden; max-width: 280px;
}
.mode-btn {
  flex: 1; padding: 8px 12px; border: none; background: transparent;
  color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: inherit;
}
.mode-btn.active { background: var(--primary); color: white; }

.plate-chip {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 4px 10px; border-radius: 14px; font-size: 12px;
  font-weight: 600; margin: 3px;
}
.p5 { background: var(--danger-bg); color: var(--danger); }
.p3 { background: var(--primary-bg); color: var(--primary); }
.p25 { background: var(--success-bg); color: var(--success); }
.p1 { background: var(--bg-input); color: var(--text-muted); border: 1px solid var(--border); }

.result-card { border-radius: var(--radius); padding: 14px; margin-top: 10px; }
.result-exact { background: var(--success-bg); border: 1px solid var(--success); }
.result-close { background: var(--warning-bg); border: 1px solid var(--warning); }
.side-box {
  background: var(--bg-input); border-radius: var(--radius-sm);
  padding: 10px 12px; flex: 1; min-width: 0;
}

.session-chip {
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 10px; cursor: pointer;
}
.session-chip:hover { border-color: var(--primary); }
.session-chip.skipped { opacity: 0.6; border-style: dashed; }

.weight-chip {
  display: inline-block; margin: 2px 3px; padding: 3px 9px;
  background: var(--bg-soft); border-radius: var(--radius-sm);
  border: 1px solid var(--border); cursor: pointer; font-size: 12px;
  color: var(--text-muted);
}
.weight-chip:hover { border-color: var(--primary); color: var(--text); }

.action-btn {
  padding: 8px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); font-size: 13px; cursor: pointer;
  font-family: inherit; margin: 0 4px;
}
.action-btn:hover { border-color: var(--primary); color: var(--text); }
.action-btn.danger { border-color: var(--danger); color: var(--danger); }
.action-btn.danger:hover { background: var(--danger-bg); }

.note-block {
  font-size: 12px; color: var(--text-muted);
  background: var(--bg-soft); padding: 8px 12px;
  border-radius: var(--radius-sm); margin-bottom: 10px;
  line-height: 1.6;
}

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid currentColor; border-right-color: transparent;
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.swipe-hint {
  text-align: center; font-size: 11px; color: var(--text-dim);
  padding: 6px 0; opacity: 0.7;
}

@media (max-width: 480px) {
  .container { padding: 12px; }
  .title { font-size: 16px; }
  .tab-btn { padding: 8px 6px; font-size: 12px; }
  .tabs { width: 100%; }
  .ex-target { font-size: 10px; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <div>
      <div class="title">💪 Workout Tracker</div>
      <div class="subtitle">5-day · chest + arms emphasis</div>
    </div>
  </div>
  <div class="tabs" style="margin-bottom: 16px;">
    <button class="tab-btn active" data-tab="log">📝 Log</button>
    <button class="tab-btn" data-tab="plates">⚖️ Plates</button>
    <button class="tab-btn" data-tab="progress">📈 Progress</button>
    <button class="tab-btn" data-tab="schedule">📅 Schedule</button>
  </div>
  <div id="tab-content"></div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════
// SCHEDULE
// ════════════════════════════════════════════════════════════════════
const SCHEDULE = {
  1: { name: "Chest + triceps", note: "Bench is your primary mover.", exercises: [
    { name: "Flat DB bench press", sets: 4, reps: "8-15", unit: "lb/hand", tip: "When you hit 15 clean reps at M or easier two weeks in a row → go up." },
    { name: "DB fly", sets: 3, reps: "12-18", unit: "lb/hand", tip: "Slow eccentric — 3 sec down." },
    { name: "Seated shoulder press", sets: 3, reps: "10-15", unit: "lb/hand", tip: "Compound shoulder work — supports bench strength." },
    { name: "Overhead triceps ext.", sets: 3, reps: "12-18", unit: "lb", tip: "Keep elbows forward, don't let them flare." },
    { name: "Close-grip pushups", sets: 3, reps: "max", unit: "BW", tip: "Stop 1-2 reps shy of failure.", noWeight: true },
    { name: "Situps", sets: 2, reps: "max", unit: "BW", tip: "", noWeight: true },
  ]},
  2: { name: "Back + biceps", note: "Rows first, curls at the end when pre-fatigued.", exercises: [
    { name: "1-arm DB row", sets: 4, reps: "10-16", unit: "lb", tip: "Drive the elbow back, not up." },
    { name: "Chest-supported row", sets: 3, reps: "12-18", unit: "lb/hand", tip: "Chest on bench — removes lower back." },
    { name: "Reverse fly", sets: 3, reps: "15-20", unit: "lb/hand", tip: "Rear delt work — protects shoulder on bench days." },
    { name: "Hammer curls", sets: 3, reps: "12-18", unit: "lb/hand", tip: "Neutral grip hits brachialis." },
    { name: "Alternating curls", sets: 3, reps: "12-18", unit: "lb/hand", tip: "Full supination at top of each rep." },
    { name: "Situps", sets: 2, reps: "max", unit: "BW", tip: "", noWeight: true },
  ]},
  3: { name: "Legs + glutes", note: "Your one leg day — don't rush it.", exercises: [
    { name: "DB RDL", sets: 4, reps: "12-18", unit: "lb/hand", tip: "Hinge at hips, soft knees." },
    { name: "Hip thrusts", sets: 4, reps: "12-20", unit: "lb", tip: "Full glute squeeze, hold 1 sec at top." },
    { name: "Bulgarian split squat", sets: 3, reps: "10-15", unit: "lb/hand", tip: "Hardest exercise in the program." },
    { name: "Goblet squat", sets: 3, reps: "12-20", unit: "lb", tip: "Heels shoulder-width, hold DB vertical at chest." },
    { name: "Calf raises", sets: 3, reps: "15-25", unit: "lb/hand", tip: "Pause at top and bottom." },
    { name: "Situps", sets: 2, reps: "max", unit: "BW", tip: "", noWeight: true },
  ]},
  4: { name: "Arms", note: "Pure arm day. Biceps first while fresh.", exercises: [
    { name: "Strict curls", sets: 4, reps: "8-15", unit: "lb/hand", tip: "No swinging. Control the eccentric." },
    { name: "Hammer curls", sets: 3, reps: "12-18", unit: "lb/hand", tip: "Different angle from strict curls." },
    { name: "Skullcrushers", sets: 3, reps: "10-15", unit: "lb", tip: "Lower slowly, extend fast." },
    { name: "Overhead triceps ext.", sets: 3, reps: "12-18", unit: "lb", tip: "Long head of triceps." },
    { name: "Static curl hold", sets: 2, reps: "30-45 sec", unit: "lb/hand", tip: "90° hold. Finisher." },
    { name: "Situps", sets: 2, reps: "max", unit: "BW", tip: "", noWeight: true },
  ]},
  5: { name: "Shoulders + chest", note: "Second chest hit of the week.", exercises: [
    { name: "Seated shoulder press", sets: 4, reps: "10-15", unit: "lb/hand", tip: "Treat this like bench day — main compound here." },
    { name: "Flat DB bench", sets: 3, reps: "10-15", unit: "lb/hand", tip: "Second bench session — keep form tight." },
    { name: "Lateral raises", sets: 3, reps: "15-25", unit: "lb/hand", tip: "Medial delt — makes shoulders look wide." },
    { name: "Rear delt raises", sets: 3, reps: "15-20", unit: "lb/hand", tip: "Bent over, elbows slightly soft." },
    { name: "Standing low-to-high fly", sets: 3, reps: "12-18", unit: "lb/hand", tip: "Lower chest and anterior delt." },
    { name: "Situps", sets: 2, reps: "max", unit: "BW", tip: "", noWeight: true },
  ]},
};

const ALL_EX = [...new Set(Object.values(SCHEDULE).flatMap(d => d.exercises.map(e => e.name)))];

// ════════════════════════════════════════════════════════════════════
// SEED DATA (Week 6 from old tracker → seeded as Week 1)
// ════════════════════════════════════════════════════════════════════
const _s = (w, r, d) => ({ weight: String(w || ""), reps: String(r || ""), diff: d || "" });
const _rep = (n, set) => Array(n).fill(0).map(() => ({ ...set }));

const SEED_DATA = {
  1: {
    "Flat DB bench press":  _rep(4, _s(21, 20, "m")),
    "DB fly":               _rep(3, _s(10, 20, "m")),
    "Seated shoulder press":_rep(3, _s(14, 12, "m")),
    "Overhead triceps ext.":_rep(3, _s(15, 15, "h")),
    "Close-grip pushups":   _rep(3, _s("", 12, "h")),
    "Situps":               _rep(2, _s("", 17, "")),
  },
  2: {
    "1-arm DB row":         _rep(4, _s(20, 20, "m")),
    "Chest-supported row":  _rep(3, _s("", "", "")),
    "Reverse fly":          _rep(3, _s(8, 16, "h")),
    "Hammer curls":         _rep(3, _s(14, 16, "m")),
    "Alternating curls":    _rep(3, _s(11, 18, "m")),
    "Situps":               _rep(2, _s("", 18, "")),
  },
  3: {
    "DB RDL":               _rep(4, _s(25, 20, "e")),
    "Hip thrusts":          _rep(4, _s(25, 25, "m")),
    "Bulgarian split squat":_rep(3, _s(18, 15, "h")),
    "Goblet squat":         _rep(3, _s(28, 20, "m")),
    "Calf raises":          _rep(3, _s(21, 25, "e")),
    "Situps":               _rep(2, _s("", "", "")),
  },
  4: {
    "Strict curls":         _rep(4, _s(13, 18, "m")),
    "Hammer curls":         _rep(3, _s(14, 16, "m")),
    "Skullcrushers":        _rep(3, _s(5, 20, "e")),
    "Overhead triceps ext.":_rep(3, _s(15, 15, "h")),
    "Static curl hold":     _rep(2, _s(11, 40, "m")),
    "Situps":               _rep(2, _s("", 18, "m")),
  },
  5: {
    "Seated shoulder press":_rep(4, _s(15, 18, "m")),
    "Flat DB bench":        _rep(3, _s(23, 20, "m")),
    "Lateral raises":       _rep(3, _s(5, 20, "m")),
    "Rear delt raises":     _rep(3, _s(8, 16, "h")),
    "Standing low-to-high fly":_rep(3, _s(8, 18, "m")),
    "Situps":               _rep(2, _s("", 20, "m")),
  },
};

// ════════════════════════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════════════════════════
const KEY_PREFIX = 'wt_v1_';
const storage = {
  get(key) {
    try {
      const v = localStorage.getItem(KEY_PREFIX + key);
      return v ? JSON.parse(v) : null;
    } catch (e) { console.error('get error:', e); return null; }
  },
  set(key, val) {
    try { localStorage.setItem(KEY_PREFIX + key, JSON.stringify(val)); return true; }
    catch (e) { console.error('set error:', e); throw e; }
  },
  remove(key) { try { localStorage.removeItem(KEY_PREFIX + key); } catch {} },
  list(prefix) {
    const keys = [];
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(KEY_PREFIX + prefix)) keys.push(k.substring(KEY_PREFIX.length));
      }
    } catch {}
    return keys;
  },
  clearAll() {
    const toRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(KEY_PREFIX)) toRemove.push(k);
    }
    toRemove.forEach(k => localStorage.removeItem(k));
  }
};

// ════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════
const state = {
  curWeek: 1, curDay: 1, maxWeek: 12,
  sessionData: {}, allLogs: {}, allBW: {},
  dirty: false, plateMode: 1, currentTab: 'log',
  progressEx: null, progressMetric: 'weight',
  sessionIsSkipped: false,
};

const lk = (w, d) => 'log:W' + w + ':D' + d;
const bk = (w, d) => 'bw:W' + w + ':D' + d;
const defSets = n => Array(n).fill(0).map(() => ({ weight: "", reps: "", diff: "" }));
const clone = o => JSON.parse(JSON.stringify(o));
const exId = n => n.replace(/[^a-z0-9]/gi, '_');

// ════════════════════════════════════════════════════════════════════
// PLATE CALCULATOR
// ════════════════════════════════════════════════════════════════════
const BAR = 3;
const PLATES = [
  { w: 5,   maxSingle: 4, maxDual: 2, cls: "p5" },
  { w: 3,   maxSingle: 2, maxDual: 1, cls: "p3" },
  { w: 2.5, maxSingle: 2, maxDual: 1, cls: "p25" },
  { w: 1,   maxSingle: 2, maxDual: 1, cls: "p1" },
];

function getAllCombos(mode) {
  const r = [];
  const mx = PLATES.map(p => mode === 2 ? p.maxDual : p.maxSingle);
  for (let a = 0; a <= mx[0]; a++)
    for (let b = 0; b <= mx[1]; b++)
      for (let c = 0; c <= mx[2]; c++)
        for (let d = 0; d <= mx[3]; d++) {
          const perSide = a*5 + b*3 + c*2.5 + d*1;
          const total = Math.round((BAR + 2*perSide) * 10) / 10;
          r.push({ a, b, c, d, perSide, total, pairs: a+b+c+d });
        }
  return r;
}

function nextAchievable(cur, mode) {
  const above = getAllCombos(mode).filter(c => c.total > cur)
    .sort((a, b) => a.total - b.total || a.pairs - b.pairs);
  return above[0] ? above[0].total : cur;
}

function prevAchievable(cur, mode) {
  const below = getAllCombos(mode).filter(c => c.total < cur && c.total >= BAR)
    .sort((a, b) => b.total - a.total || a.pairs - b.pairs);
  return below[0] ? below[0].total : cur;
}

// ════════════════════════════════════════════════════════════════════
// RECOMMENDATION ENGINE (range-aware, stale-aware)
// ════════════════════════════════════════════════════════════════════
function parseTopRep(s) {
  const m = String(s).match(/(\d+)\s*[-–—]\s*(\d+)/);
  return m ? parseInt(m[2]) : null;
}
function parseBottomRep(s) {
  const m = String(s).match(/(\d+)\s*[-–—]\s*(\d+)/);
  return m ? parseInt(m[1]) : null;
}

function getLastSession(exName) {
  for (let w = state.curWeek - 1; w >= 1; w--) {
    const log = state.allLogs[lk(w, state.curDay)];
    if (log && !log.skipped && log.exercises && log.exercises[exName]) {
      const sets = log.exercises[exName];
      if (sets.some(s => s.weight || s.reps || s.diff)) {
        return { week: w, sets };
      }
    }
  }
  return null;
}

function getRec(ex) {
  if (ex.noWeight) return null;
  const last = getLastSession(ex.name);
  if (!last) return null;

  const ws = last.sets.map(s => parseFloat(s.weight)).filter(x => !isNaN(x) && x > 0);
  const lastWeight = ws.length ? Math.max(...ws) : null;
  if (lastWeight === null) return { last, lastWeight: null, action: 'none', msg: 'Logged but no weight' };

  // Stale check
  const weeksSince = state.curWeek - last.week;
  if (weeksSince > 2) {
    const mode = ex.unit === 'lb/hand' ? 2 : 1;
    return {
      last, lastWeight,
      suggested: prevAchievable(lastWeight, mode),
      action: 'stale',
      msg: weeksSince + ' weeks since last — start lighter and build back up'
    };
  }

  const topRep = parseTopRep(ex.reps);
  const bottomRep = parseBottomRep(ex.reps);
  const feels = last.sets.map(s => s.diff);
  const allMarked = feels.length === last.sets.length && feels.every(d => d);
  const hasHard = feels.includes('h');
  const allEasyMed = allMarked && feels.every(d => d === 'e' || d === 'm');
  const repNums = last.sets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
  const avgReps = repNums.length ? repNums.reduce((a, b) => a + b) / repNums.length : 0;
  const mode = ex.unit === 'lb/hand' ? 2 : 1;

  // Time/max-based exercises (no numeric rep target)
  if (topRep === null) {
    if (!allMarked) return { last, lastWeight, suggested: lastWeight, action: 'stay', msg: 'Mark difficulty for a recommendation' };
    if (allEasyMed && !hasHard) return { last, lastWeight, suggested: nextAchievable(lastWeight, mode), action: 'up', msg: 'Felt manageable' };
    if (hasHard) return { last, lastWeight, suggested: lastWeight, action: 'hard', msg: 'Felt hard — stay' };
    return { last, lastWeight, suggested: lastWeight, action: 'stay', msg: 'Stay' };
  }

  if (!allMarked) return { last, lastWeight, suggested: lastWeight, action: 'stay', msg: 'Mark difficulty for a recommendation' };

  // 1. Above top of range
  if (avgReps > topRep) {
    if (allEasyMed) {
      const farAbove = avgReps > topRep + 2;
      return { last, lastWeight, suggested: nextAchievable(lastWeight, mode), action: 'up',
        msg: farAbove ? 'Reps above target — weight too light' : 'Hit top reps, felt manageable' };
    }
    if (hasHard) return { last, lastWeight, suggested: lastWeight, action: 'hard', msg: 'Hit top reps but felt hard' };
  }

  // 2. Exactly at top of range
  if (avgReps >= topRep) {
    if (allEasyMed) return { last, lastWeight, suggested: nextAchievable(lastWeight, mode), action: 'up', msg: 'Hit top reps, felt manageable' };
    if (hasHard) return { last, lastWeight, suggested: lastWeight, action: 'hard', msg: 'Hit top reps but felt hard' };
  }

  // 3. In range (between bottom and top)
  if (avgReps >= bottomRep) {
    if (allEasyMed) {
      const upperHalf = avgReps >= bottomRep + (topRep - bottomRep) * 0.5;
      return { last, lastWeight, suggested: lastWeight, action: 'in-range',
        msg: upperHalf ? 'Working weight — push for top of range' : 'In target range — push for more reps' };
    }
    if (hasHard) return { last, lastWeight, suggested: lastWeight, action: 'hard', msg: 'In range but felt hard — keep working' };
  }

  // 4. Below bottom of range
  if (hasHard) return { last, lastWeight, suggested: prevAchievable(lastWeight, mode), action: 'down', msg: 'Below target, felt hard — drop weight' };
  return { last, lastWeight, suggested: lastWeight, action: 'stay', msg: 'Below target — focus on getting more reps' };
}

function fmtFeel(d) {
  const cls = { e: 'fm-e', m: 'fm-m', h: 'fm-h' }[d] || 'fm-o';
  return '<span class="feel-mini ' + cls + '">' + (d ? d.toUpperCase() : '·') + '</span>';
}

function fmtLastSets(sets, noWeight) {
  const ws = [...new Set(sets.map(s => s.weight).filter(w => w))];
  const wStr = noWeight ? '' : (ws.length === 1
    ? '<strong>' + ws[0] + ' lb</strong>'
    : ws.length > 0 ? '<strong>' + ws.join('/') + ' lb</strong>' : '');
  const reps = sets.map(s => s.reps || '—').join('·');
  const feels = sets.map(s => fmtFeel(s.diff)).join('');
  return wStr + (wStr ? ' × ' : '') + reps + ' ' + feels;
}

// ════════════════════════════════════════════════════════════════════
// VOLUME
// ════════════════════════════════════════════════════════════════════
function calcVolume(exercises) {
  let total = 0;
  if (!exercises) return 0;
  Object.values(exercises).forEach(sets => {
    if (!Array.isArray(sets)) return;
    sets.forEach(s => {
      const w = parseFloat(s.weight);
      const r = parseInt(s.reps);
      if (!isNaN(w) && !isNaN(r) && w > 0 && r > 0) total += w * r;
    });
  });
  return Math.round(total);
}

function getLastSessionVolume() {
  for (let w = state.curWeek - 1; w >= 1; w--) {
    const log = state.allLogs[lk(w, state.curDay)];
    if (log && !log.skipped && log.exercises) {
      const v = calcVolume(log.exercises);
      if (v > 0) return { week: w, volume: v };
    }
  }
  return null;
}

// ════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function initSessionData() {
  const log = state.allLogs[lk(state.curWeek, state.curDay)];
  state.sessionIsSkipped = !!(log && log.skipped);
  const existing = (log && !log.skipped && log.exercises) ? log.exercises : {};
  state.sessionData = {};
  SCHEDULE[state.curDay].exercises.forEach(ex => {
    state.sessionData[ex.name] = existing[ex.name] ? clone(existing[ex.name]) : defSets(ex.sets);
  });
}

function loadCurrentSession() {
  initSessionData();
  state.dirty = false;
  render();
}

// ════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════
function render() {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.currentTab);
  });
  const content = document.getElementById('tab-content');
  if (state.currentTab === 'log') content.innerHTML = renderLogTab();
  else if (state.currentTab === 'plates') content.innerHTML = renderPlatesTab();
  else if (state.currentTab === 'progress') content.innerHTML = renderProgressTab();
  else if (state.currentTab === 'schedule') content.innerHTML = renderScheduleTab();

  if (state.currentTab === 'progress') drawProgressCharts();
  if (state.currentTab === 'plates') updatePlateResult();
  if (state.currentTab === 'log') {
    const bw = state.allBW[bk(state.curWeek, state.curDay)];
    const bwInp = document.getElementById('bw-input');
    if (bwInp) bwInp.value = bw ? bw.weight : '';
  }
}

function renderLogTab() {
  let html = '';

  // Week + Day selector
  let weekBtns = '';
  for (let w = 1; w <= state.maxWeek; w++) {
    const cls = ['wk-btn'];
    const dayKeys = Object.keys(state.allLogs).filter(k => k.startsWith('log:W' + w + ':'));
    const hasReal = dayKeys.some(k => !state.allLogs[k].skipped);
    if (hasReal) cls.push('logged');
    if (w === state.curWeek) cls.push('active');
    weekBtns += '<button class="' + cls.join(' ') + '" data-week="' + w + '">' + w + '</button>';
  }
  weekBtns += '<button class="wk-btn add" data-action="add-week" title="Add next week">+</button>';

  let dayBtns = '';
  for (let d = 1; d <= 5; d++) {
    const cls = ['day-btn'];
    const log = state.allLogs[lk(state.curWeek, d)];
    if (log) cls.push(log.skipped ? 'skipped' : 'logged');
    if (d === state.curDay) cls.push('active');
    dayBtns += '<button class="' + cls.join(' ') + '" data-day="' + d + '">D' + d + '</button>';
  }

  html += '<div class="card card-tight" style="margin-bottom:12px">' +
    '<div class="selector">' +
      '<div style="flex:1;min-width:0">' +
        '<div class="selector-label">Week</div>' +
        '<div class="btn-row">' + weekBtns + '</div>' +
      '</div>' +
      '<div>' +
        '<div class="selector-label">Day</div>' +
        '<div class="btn-row">' + dayBtns + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  // Session header
  const day = SCHEDULE[state.curDay];
  html += '<div class="session-header">' +
    '<div>' +
      '<span class="session-title">Week ' + state.curWeek + ' · Day ' + state.curDay + '</span>' +
      '<span class="session-subtitle">' + esc(day.name) + '</span>' +
    '</div>' +
    '<div class="session-meta">' +
      (state.sessionIsSkipped
        ? '<button class="skip-btn" data-action="unskip">Restore</button>'
        : '<button class="skip-btn" data-action="skip">⏭ Skip day</button>') +
      '<span class="saved-badge" id="saved-badge">✓ Saved</span>' +
    '</div>' +
  '</div>';

  // Skipped notice
  if (state.sessionIsSkipped) {
    html += '<div class="skipped-notice">' +
      '<strong>This day was skipped.</strong> Click <em>Restore</em> above to log data for it instead.' +
    '</div>';
  }

  // Body weight
  const bw = state.allBW[bk(state.curWeek, state.curDay)];
  html += '<div class="card card-tight bw-card">' +
    '<span class="bw-label">⚖️ Body weight</span>' +
    '<input type="number" step="0.1" placeholder="0.0" id="bw-input" class="num-inp bw-inp" value="' + (bw ? bw.weight : '') + '">' +
    '<span style="font-size:12px;color:var(--text-dim)">lbs</span>' +
  '</div>';

  if (!state.sessionIsSkipped) {
    day.exercises.forEach(ex => { html += renderExercise(ex); });

    // Volume summary
    const curVol = calcVolume(state.sessionData);
    const lastVol = getLastSessionVolume();
    let volDelta = '', deltaCls = 'same';
    if (curVol > 0 && lastVol) {
      const d = curVol - lastVol.volume;
      if (d > 0) { volDelta = '↑ ' + d.toLocaleString() + ' vs W' + lastVol.week; deltaCls = 'up'; }
      else if (d < 0) { volDelta = '↓ ' + Math.abs(d).toLocaleString() + ' vs W' + lastVol.week; deltaCls = 'down'; }
      else { volDelta = '= W' + lastVol.week; }
    } else if (curVol > 0) {
      volDelta = 'first session';
    }
    html += '<div class="volume-card">' +
      '<div>' +
        '<div class="volume-label">Session volume</div>' +
        '<div class="volume-value">' + curVol.toLocaleString() + ' <span style="font-size:13px;color:var(--text-dim);font-weight:500">lbs total</span></div>' +
      '</div>' +
      (volDelta ? '<div class="volume-delta ' + deltaCls + '">' + volDelta + '</div>' : '') +
    '</div>';

    html += '<button class="save-btn" id="save-btn">💾 Save workout</button>';
    html += '<div class="swipe-hint">⟵ swipe between days ⟶</div>';
  }

  return html;
}

function renderExercise(ex) {
  const sets = state.sessionData[ex.name] || defSets(ex.sets);
  const last = getLastSession(ex.name);
  const cols = ex.noWeight ? '32px 1fr 100px' : '32px 1fr 1fr 100px';
  const exName = esc(ex.name);
  const id = exId(ex.name);

  let html = '<div class="card">' +
    '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">' +
      '<span class="ex-name">' + esc(ex.name) + '</span>' +
      '<span class="ex-target">' + ex.sets + ' sets × ' + ex.reps + ' reps' +
        (ex.unit !== 'BW' ? ' · ' + ex.unit : '') +
      '</span>' +
    '</div>';

  if (ex.tip) html += '<div class="ex-tip">' + esc(ex.tip) + '</div>';

  // Recommendation
  const rec = getRec(ex);
  if (rec) {
    const config = {
      up:       { cls: 'rec-up',       icon: '↑', content: 'Try <strong>' + rec.suggested + ' lb</strong> — ' + esc(rec.msg) },
      hard:     { cls: 'rec-hard',     icon: '=', content: 'Stay at <strong>' + rec.lastWeight + ' lb</strong> — ' + esc(rec.msg) },
      'in-range': { cls: 'rec-in-range', icon: '◯', content: 'Working weight at <strong>' + rec.lastWeight + ' lb</strong> — ' + esc(rec.msg) },
      down:     { cls: 'rec-down',     icon: '↓', content: 'Drop to <strong>' + rec.suggested + ' lb</strong> — ' + esc(rec.msg) },
      stay:     { cls: 'rec-stay',     icon: '=', content: 'Stay at <strong>' + (rec.lastWeight || '—') + ' lb</strong> — ' + esc(rec.msg) },
      stale:    { cls: 'rec-stale',    icon: '◌', content: 'Start at <strong>' + rec.suggested + ' lb</strong> — ' + esc(rec.msg) },
      none:     { cls: 'rec-stay',     icon: '·', content: esc(rec.msg) },
    }[rec.action] || { cls: 'rec-stay', icon: '·', content: esc(rec.msg) };

    const target = (rec.action === 'up' || rec.action === 'down' || rec.action === 'stale') ? rec.suggested : rec.lastWeight;
    const applyBtn = target
      ? '<button class="apply-btn" data-action="apply" data-ex="' + exName + '" data-weight="' + target + '">Apply ' + target + '</button>'
      : '';

    html += '<div class="rec ' + config.cls + '">' +
      '<div class="rec-text"><span style="font-weight:700">' + config.icon + '</span><span>' + config.content + '</span></div>' +
      applyBtn +
    '</div>';
    html += '<div class="last-row">↺ W' + rec.last.week + ': ' + fmtLastSets(rec.last.sets, ex.noWeight) + '</div>';
  }

  // Header
  html += '<div class="set-grid-head" style="grid-template-columns:' + cols + '">' +
    '<span class="gh">Set</span>' +
    (ex.noWeight ? '' : '<span class="gh">Weight</span>') +
    '<span class="gh">Reps</span>' +
    '<span class="gh">Feel</span>' +
  '</div>';

  // Set rows
  sets.forEach((s, i) => {
    const lastSet = last && last.sets[i];
    const wPh = (lastSet && lastSet.weight) || (ex.unit === 'BW' ? '' : 'lb');
    const rPh = (lastSet && lastSet.reps) || 'reps';

    const wInp = ex.noWeight ? '' :
      '<input type="number" step="0.5" placeholder="' + esc(wPh) + '" value="' + esc(s.weight) + '" class="num-inp" ' +
      'data-ex="' + exName + '" data-set="' + i + '" data-field="weight">';

    // Reps delta calculation
    const lastReps = lastSet ? parseInt(lastSet.reps) : NaN;
    const curReps = parseInt(s.reps);
    let deltaHtml = '<span class="reps-delta" id="delta-' + id + '-' + i + '"></span>';
    if (!isNaN(lastReps) && !isNaN(curReps) && lastReps > 0 && curReps !== lastReps) {
      const d = curReps - lastReps;
      const dCls = d > 0 ? 'up' : 'down';
      const arrow = d > 0 ? '↑' : '↓';
      deltaHtml = '<span class="reps-delta ' + dCls + '" id="delta-' + id + '-' + i + '">' + arrow + Math.abs(d) + '</span>';
    }

    const feelBtns = ['e', 'm', 'h'].map(d => {
      const sel = s.diff === d ? 'sel-' + d : '';
      return '<button class="pill ' + sel + '" data-action="feel" ' +
        'data-ex="' + exName + '" data-set="' + i + '" data-diff="' + d + '">' + d.toUpperCase() + '</button>';
    }).join('');

    html += '<div class="set-grid-row" style="grid-template-columns:' + cols + '">' +
      '<span class="set-num">S' + (i+1) + '</span>' +
      wInp +
      '<div class="reps-cell">' +
        '<input type="number" placeholder="' + esc(rPh) + '" value="' + esc(s.reps) + '" class="num-inp" ' +
          'data-ex="' + exName + '" data-set="' + i + '" data-field="reps">' +
        deltaHtml +
      '</div>' +
      '<div class="feel-group">' + feelBtns + '</div>' +
    '</div>';
  });

  html += '</div>';
  return html;
}

function renderPlatesTab() {

    '<div style="font-size:14px;font-weight:600;margin-bottom:4px">⚖️ Plate calculator</div>' +
    '<div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">' +

    '</div>' +
    '<div style="margin-bottom:12px">' +
      '<div class="selector-label" style="margin-bottom:6px">Target weight (lb per dumbbell)</div>' +
      '<input type="number" step="0.5" placeholder="e.g. 25" id="plate-target" class="num-inp" style="width:120px;font-size:18px;font-weight:600">' +
    '</div>' +
    '<div>' +
      '<div class="selector-label" style="margin-bottom:6px">Loading for</div>' +
      '<div class="mode-toggle">' +
        '<button class="mode-btn ' + (state.plateMode === 1 ? 'active' : '') + '" data-mode="1">1 dumbbell</button>' +
        '<button class="mode-btn ' + (state.plateMode === 2 ? 'active' : '') + '" data-mode="2">2 matching</button>' +
      '</div>' +

  '<div class="card">' +
    '<div style="font-size:13px;font-weight:600;margin-bottom:8px">' +
      'All achievable weights <span id="all-weights-mode" style="font-weight:400;color:var(--text-dim)"></span>' +
    '</div>' +

}

function updatePlateResult() {
  buildAllWeights();
  const inp = document.getElementById('plate-target');
  const target = inp ? parseFloat(inp.value) : NaN;
  const res = document.getElementById('plate-result');
  if (!res) return;
  if (!target || isNaN(target)) { res.innerHTML = ''; return; }
  const t = Math.round(target * 10) / 10;
  const combos = getAllCombos(state.plateMode);
  const exact = combos.filter(c => c.total === t).sort((a, b) => a.pairs - b.pairs);
  const below = combos.filter(c => c.total < t).sort((a, b) => b.total - a.total || a.pairs - b.pairs);
  const above = combos.filter(c => c.total > t).sort((a, b) => a.total - b.total || a.pairs - b.pairs);
  let html = '';
  if (exact.length) html += plateResult(exact[0], 'exact', 'Exact — ' + t + ' lb');
  else {
    html += '<div style="font-size:12px;color:var(--warning);background:var(--warning-bg);padding:8px 12px;border-radius:var(--radius-sm);margin-top:12px">' + t + ' lb isn\'t achievable. Closest options:</div>';
    if (below.length) html += plateResult(below[0], 'close', below[0].total + ' lb (' + (Math.round((t-below[0].total)*10)/10) + ' lb under)');
    if (above.length) html += plateResult(above[0], 'close', above[0].total + ' lb (+' + (Math.round((above[0].total-t)*10)/10) + ' lb over)');
  }
  res.innerHTML = html;
}

function plateChips(c) {
  const p = [];
  if (c.a) p.push({ n: c.a, w: 5, cls: 'p5' });
  if (c.b) p.push({ n: c.b, w: 3, cls: 'p3' });
  if (c.c) p.push({ n: c.c, w: 2.5, cls: 'p25' });
  if (c.d) p.push({ n: c.d, w: 1, cls: 'p1' });
  return p.length
    ? p.map(x => '<span class="plate-chip ' + x.cls + '">' + (x.n > 1 ? x.n + '× ' : '') + x.w + ' lb</span>').join('')
    : '<span style="font-size:12px;color:var(--text-dim)">No plates — bar only (3 lb)</span>';
}

function plateResult(c, type, label) {
  const ex = type === 'exact';
  const cardCls = ex ? 'result-card result-exact' : 'result-card result-close';
  const lc = ex ? 'var(--success)' : 'var(--warning)';
  const dn = state.plateMode === 2 ? ' — load both bars the same way' : '';
  return '<div class="' + cardCls + '">' +
    '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">' +
      '<span style="font-size:13px;font-weight:600;color:' + lc + '">' + label + dn + '</span>' +
      '<span style="font-size:22px;font-weight:600">' + c.total + ' lb</span>' +
    '</div>' +
    '<div style="display:flex;gap:10px;flex-wrap:wrap">' +
      '<div class="side-box">' +
        '<div class="selector-label" style="margin-bottom:6px">Each side of the bar</div>' +
        '<div>' + plateChips(c) + '</div>' +
        (c.perSide > 0 ? '<div style="font-size:11px;color:var(--text-dim);margin-top:6px">' + c.perSide + ' lb × 2 sides</div>' : '') +
      '</div>' +
      '<div class="side-box" style="max-width:130px;text-align:center">' +
        '<div class="selector-label" style="margin-bottom:6px">Breakdown</div>' +
        '<div style="font-size:12px;color:var(--text-muted);line-height:1.8">' +
          BAR + ' lb bar<br>+ ' + (Math.round(c.perSide*2*10)/10) + ' lb plates<br>' +
          '<span style="font-weight:600;color:var(--text);font-size:14px">= ' + c.total + ' lb</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function buildAllWeights() {
  const el = document.getElementById('all-weights');
  const ml = document.getElementById('all-weights-mode');
  if (!el) return;
  if (ml) ml.textContent = state.plateMode === 1 ? '(single DB)' : '(dual matching)';
  const u = [...new Set(getAllCombos(state.plateMode).map(c => c.total))].sort((a, b) => a - b);
  el.innerHTML = u.map(w => '<span class="weight-chip" data-weight="' + w + '">' + w + '</span>').join('');
}

  return '<div class="card">' +

    '<div id="bw-chart" style="min-height:140px"></div>' +
  '</div>' +
  '<div class="card">' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">' +
      '<span style="font-size:13px;font-weight:600">📈 Exercise weight</span>' +
      '<select id="ex-select">' + exOpts + '</select>' +

function drawProgressCharts() {
  // Body weight
  const bwData = [];
  for (let w = 1; w <= state.maxWeek; w++)
    for (let d = 1; d <= 5; d++) {
      const b = state.allBW[bk(w, d)];
      if (b && b.weight) bwData.push({ label: 'W' + w + 'D' + d, val: b.weight });
    }
  drawChart(document.getElementById('bw-chart'), bwData, '#3b82f6', 'lbs');

  // Exercise weight
  const exName = state.progressEx || ALL_EX[0];
  const exData = [];
  for (let w = 1; w <= state.maxWeek; w++)
    for (let d = 1; d <= 5; d++) {
      const log = state.allLogs[lk(w, d)];
      if (log && !log.skipped && log.exercises && log.exercises[exName]) {
        const ws = log.exercises[exName].map(s => parseFloat(s.weight)).filter(x => !isNaN(x) && x > 0);
        if (ws.length) exData.push({ label: 'W' + w + 'D' + d, val: Math.round(ws.reduce((a, b) => a + b) / ws.length * 10) / 10 });
      }
    }
  drawChart(document.getElementById('ex-chart'), exData, '#a855f7', 'lb');

  // Volume
  const volData = [];
  for (let w = 1; w <= state.maxWeek; w++)
    for (let d = 1; d <= 5; d++) {
      const log = state.allLogs[lk(w, d)];
      if (log && !log.skipped && log.exercises) {
        const v = calcVolume(log.exercises);
        if (v > 0) volData.push({ label: 'W' + w + 'D' + d, val: v });
      }
    }
  drawChart(document.getElementById('vol-chart'), volData, '#22c55e', 'lbs');

  // Sessions
  const grid = document.getElementById('sessions-grid');
  const logged = Object.keys(state.allLogs).sort();
  if (!logged.length) {
    grid.innerHTML = '<div style="font-size:12px;color:var(--text-dim)">No sessions saved yet</div>';
  } else {
    grid.innerHTML = logged.map(key => {
      const m = key.match(/log:W(\d+):D(\d+)/);
      if (!m) return '';
      const w = m[1], d = m[2];
      const log = state.allLogs[key];
      const bw = state.allBW[bk(w, d)];
      const skippedCls = log.skipped ? ' skipped' : '';
      const label = log.skipped ? 'Skipped' : (SCHEDULE[d] ? SCHEDULE[d].name : '');
      return '<div class="session-chip' + skippedCls + '" data-session="' + w + ':' + d + '">' +
        '<div style="font-size:13px;font-weight:600">W' + w + ' · D' + d + '</div>' +
        '<div style="font-size:11px;color:var(--text-muted)">' + esc(label) + '</div>' +
        (bw && !log.skipped ? '<div style="font-size:11px;color:var(--primary);margin-top:2px">' + bw.weight + ' lbs</div>' : '') +
      '</div>';
    }).join('');
  }
}

function drawChart(container, pts, color, unit) {
  if (!container) return;
  if (!pts.length) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:12px 0">No data yet</div>';
    return;
  }
  const vals = pts.map(p => p.val);
  const mn = Math.min(...vals) * 0.97;
  const mx = Math.max(...vals) * 1.03 + 0.001;
  const W = 600, H = 140;
  const fy = v => H - 16 - ((v - mn) / (mx - mn || 1)) * (H - 32);
  let path = '', dots = '';
  pts.forEach((p, i) => {
    const x = 10 + i * (W - 20) / (pts.length - 1 || 1);
    const y = fy(p.val);
    path += i === 0 ? 'M' + x + ',' + y : ' L' + x + ',' + y;
    dots += '<circle cx="' + x + '" cy="' + y + '" r="3" fill="' + color + '"><title>' + p.label + ': ' + p.val + ' ' + unit + '</title></circle>';
  });
  const delta = Math.round((pts[pts.length - 1].val - pts[0].val) * 10) / 10;
  const sign = delta >= 0 ? '+' : '';
  const dc = delta >= 0 ? 'var(--success)' : 'var(--danger)';
  container.innerHTML =
    '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:4px">' +
      '<span>' + pts[0].val + ' → ' + pts[pts.length-1].val + ' ' + unit + '</span>' +
      '<span style="color:' + dc + '">' + sign + delta + ' ' + unit + '</span>' +
    '</div>' +
    '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible">' +
      '<path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="2"/>' + dots +
    '</svg>' +
    '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:4px">' +
      '<span>' + pts[0].label + '</span><span>' + pts[pts.length-1].label + '</span>' +
    '</div>';
}

function renderScheduleTab() {

    '<div style="font-size:13px;font-weight:600;margin-bottom:6px">📈 Progression rules</div>' +

      '<strong style="color:var(--success)">↑ Increase</strong> — hit top of rep range at E/M feel<br>' +
      '<strong style="color:var(--primary)">◯ Working weight</strong> — in target range at E/M feel<br>' +
      '<strong style="color:var(--warning)">= Stay</strong> — hit reps but felt hard<br>' +
      '<strong style="color:var(--warning)">↓ Drop</strong> — below target range and felt hard<br>' +
      '<strong style="color:var(--text-dim)">◌ Stale</strong> — 3+ weeks gap, start lighter' +
    '</div>' +
    '<div style="font-size:12px;color:var(--text-muted);margin-top:8px">' +
      '<strong style="color:var(--text)">Suggested order:</strong> D1 → D2 → D3 → rest → D4 → D5 → rest' +

// ════════════════════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════════════════════
function toggleFeel(exName, setIdx, diff) {
  if (!state.sessionData[exName]) return;
  const cur = state.sessionData[exName][setIdx].diff;
  state.sessionData[exName][setIdx].diff = cur === diff ? '' : diff;
  state.dirty = true;
  render();
}

function applyWeight(exName, weight) {
  if (!state.sessionData[exName]) return;
  let changed = false;
  state.sessionData[exName].forEach(s => {
    if (!s.weight) { s.weight = String(weight); changed = true; }
  });
  if (changed) { state.dirty = true; render(); }
}

function autofillWeight(exName, setIdx, val) {
  if (!val || !state.sessionData[exName]) return;
  let changed = false;
  for (let j = setIdx + 1; j < state.sessionData[exName].length; j++) {
    if (!state.sessionData[exName][j].weight) {
      state.sessionData[exName][j].weight = String(val);
      changed = true;
    }
  }
  if (changed) { state.dirty = true; render(); }
}

function markDirty() {
  state.dirty = true;
  const sb = document.getElementById('saved-badge');
  if (sb) sb.classList.remove('show');
  updateSaveBtn();
}

function updateSaveBtn() {
  const b = document.getElementById('save-btn');
  if (!b) return;
  b.className = 'save-btn' + (state.dirty ? '' : ' saved');
  b.innerHTML = state.dirty ? '💾 Save workout' : '✓ Saved';
}

function updateVolumeCard() {
  const card = document.querySelector('.volume-card');
  if (!card) return;
  const curVol = calcVolume(state.sessionData);
  const lastVol = getLastSessionVolume();
  const valEl = card.querySelector('.volume-value');
  if (valEl) valEl.innerHTML = curVol.toLocaleString() + ' <span style="font-size:13px;color:var(--text-dim);font-weight:500">lbs total</span>';
  const dEl = card.querySelector('.volume-delta');
  if (curVol > 0 && lastVol) {
    const d = curVol - lastVol.volume;
    let txt, cls;
    if (d > 0) { txt = '↑ ' + d.toLocaleString() + ' vs W' + lastVol.week; cls = 'up'; }
    else if (d < 0) { txt = '↓ ' + Math.abs(d).toLocaleString() + ' vs W' + lastVol.week; cls = 'down'; }
    else { txt = '= W' + lastVol.week; cls = 'same'; }
    if (dEl) { dEl.textContent = txt; dEl.className = 'volume-delta ' + cls; }
    else card.insertAdjacentHTML('beforeend', '<div class="volume-delta ' + cls + '">' + txt + '</div>');
  }
}

function updateRepsDelta(exName, setIdx) {
  const last = getLastSession(exName);
  if (!last) return;
  const lastSet = last.sets[setIdx];
  if (!lastSet) return;
  const lastReps = parseInt(lastSet.reps);
  const curReps = parseInt(state.sessionData[exName][setIdx].reps);
  const el = document.getElementById('delta-' + exId(exName) + '-' + setIdx);
  if (!el) return;
  if (isNaN(lastReps) || isNaN(curReps) || lastReps <= 0 || curReps === lastReps) {
    el.textContent = ''; el.className = 'reps-delta'; return;
  }
  const d = curReps - lastReps;
  el.textContent = (d > 0 ? '↑' : '↓') + Math.abs(d);
  el.className = 'reps-delta ' + (d > 0 ? 'up' : 'down');
}

function saveWorkout() {
  const btn = document.getElementById('save-btn');
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  try {
    const cleanData = {};
    Object.entries(state.sessionData).forEach(([k, sets]) => {
      cleanData[k] = sets.map(s => ({
        weight: String(s.weight || ''), reps: String(s.reps || ''), diff: s.diff || '',
      }));
    });
    const key = lk(state.curWeek, state.curDay);
    const log = { exercises: cleanData, savedAt: new Date().toISOString() };
    storage.set(key, log);
    state.allLogs[key] = log;

    const bwInp = document.getElementById('bw-input');
    const bwVal = bwInp ? bwInp.value : '';
    if (bwVal) {
      const bd = { weight: parseFloat(bwVal) };
      storage.set(bk(state.curWeek, state.curDay), bd);
      state.allBW[bk(state.curWeek, state.curDay)] = bd;
    }

    state.dirty = false;
    btn.disabled = false;
    updateSaveBtn();
    const sb = document.getElementById('saved-badge');
    if (sb) sb.classList.add('show');
    setTimeout(() => render(), 100);
  } catch (e) {
    console.error('Save failed:', e);
    btn.disabled = false;
    btn.className = 'save-btn err';
    btn.innerHTML = '⚠️ ' + (e && e.message ? e.message : 'Save failed');
    setTimeout(() => { updateSaveBtn(); }, 4000);
  }
}

function addWeek() {
  state.maxWeek++;
  storage.set('maxWeek', state.maxWeek);
  state.curWeek = state.maxWeek;
  loadCurrentSession();
}

function switchTab(tab) {
  state.currentTab = tab;
  if (tab === 'progress' && !state.progressEx) {
    state.progressEx = ALL_EX.find(n => n !== 'Situps' && n !== 'Close-grip pushups');
  }
  render();
}

function skipDay() {
  if (!confirm('Mark Week ' + state.curWeek + ' Day ' + state.curDay + ' as skipped? You can restore it anytime.')) return;
  const key = lk(state.curWeek, state.curDay);
  const log = { skipped: true, savedAt: new Date().toISOString() };
  storage.set(key, log);
  state.allLogs[key] = log;
  state.dirty = false;
  loadCurrentSession();
}

function unskipDay() {
  const key = lk(state.curWeek, state.curDay);
  storage.remove(key);
  delete state.allLogs[key];
  loadCurrentSession();
}

function resetData() {
  if (!confirm('Delete ALL workout data? This cannot be undone.')) return;
  storage.clearAll();
  location.reload();
}

function exportCSV() {
  const rows = [['Week','Day','DayName','Exercise','Set','Weight','Reps','Difficulty','BodyWeight','Skipped','SessionDate']];
  Object.keys(state.allLogs).sort().forEach(key => {
    const m = key.match(/log:W(\d+):D(\d+)/);
    if (!m) return;
    const w = m[1], d = m[2];
    const log = state.allLogs[key];
    const dayName = SCHEDULE[d] ? SCHEDULE[d].name : '';
    const bw = state.allBW[bk(w, d)];
    const bwVal = bw ? bw.weight : '';
    const date = log.savedAt || '';

    if (log.skipped) {
      rows.push([w, d, dayName, '', '', '', '', '', bwVal, 'yes', date]);
      return;
    }

    Object.entries(log.exercises || {}).forEach(([exName, sets]) => {
      sets.forEach((s, i) => {
        rows.push([w, d, dayName, exName, i+1, s.weight || '', s.reps || '', s.diff || '', bwVal, 'no', date]);
      });
    });
  });

  const csv = rows.map(row => row.map(cell => {
    const s = String(cell);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(',')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'workout-data-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ════════════════════════════════════════════════════════════════════
// EVENT DELEGATION
// ════════════════════════════════════════════════════════════════════
function attachEventListeners() {
  document.addEventListener('click', (e) => {
    const t = e.target;
    const tab = t.closest('[data-tab]');
    if (tab) { switchTab(tab.dataset.tab); return; }
    const wk = t.closest('[data-week]');
    if (wk) { state.curWeek = +wk.dataset.week; loadCurrentSession(); return; }
    const day = t.closest('[data-day]');
    if (day) { state.curDay = +day.dataset.day; loadCurrentSession(); return; }
    const act = t.closest('[data-action]');
    if (act) {
      const action = act.dataset.action;
      if (action === 'add-week') addWeek();
      else if (action === 'feel') toggleFeel(act.dataset.ex, +act.dataset.set, act.dataset.diff);
      else if (action === 'apply') applyWeight(act.dataset.ex, parseFloat(act.dataset.weight));
      else if (action === 'reset-data') resetData();
      else if (action === 'export-csv') exportCSV();
      else if (action === 'skip') skipDay();
      else if (action === 'unskip') unskipDay();
      return;
    }
    const mode = t.closest('[data-mode]');
    if (mode) { state.plateMode = +mode.dataset.mode; render(); return; }
    const wc = t.closest('[data-weight]:not([data-action])');
    if (wc) {
      const inp = document.getElementById('plate-target');
      if (inp) { inp.value = wc.dataset.weight; updatePlateResult(); }
      return;
    }
    const sc = t.closest('[data-session]');
    if (sc) {
      const parts = sc.dataset.session.split(':');
      state.curWeek = +parts[0]; state.curDay = +parts[1];
      state.currentTab = 'log';
      loadCurrentSession();
      return;
    }
    const dj = t.closest('[data-day-jump]');
    if (dj) {
      state.curDay = +dj.dataset.dayJump;
      state.currentTab = 'log';
      loadCurrentSession();
      return;
    }
    if (t.closest('#save-btn')) { saveWorkout(); return; }
  });

  document.addEventListener('input', (e) => {
    const t = e.target;
    if (t.id === 'bw-input') { markDirty(); return; }
    if (t.id === 'plate-target') { updatePlateResult(); return; }
    if (t.id === 'ex-select') return;
    const inp = t.closest('input[data-ex]');
    if (inp) {
      const exName = inp.dataset.ex;
      const setIdx = +inp.dataset.set;
      const field = inp.dataset.field;
      if (state.sessionData[exName]) {
        state.sessionData[exName][setIdx][field] = inp.value;
        markDirty();
        if (field === 'reps') updateRepsDelta(exName, setIdx);
        if (field === 'weight' || field === 'reps') updateVolumeCard();
      }
    }
  });

  document.addEventListener('change', (e) => {
    const t = e.target;
    if (t.id === 'ex-select') {
      state.progressEx = t.value;
      drawProgressCharts();
      return;
    }
    const inp = t.closest('input[data-ex]');
    if (inp && inp.dataset.field === 'weight') {
      autofillWeight(inp.dataset.ex, +inp.dataset.set, inp.value);
    }
  });

  // Swipe between days (mobile)
  let touchData = { x: 0, y: 0, t: 0, valid: false };
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    if (state.currentTab !== 'log') return;
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'BUTTON' || tag === 'TEXTAREA') return;
    touchData = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now(), valid: true };
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!touchData.valid) return;
    touchData.valid = false;
    if (e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - touchData.x;
    const dy = e.changedTouches[0].clientY - touchData.y;
    const dt = Date.now() - touchData.t;
    if (Math.abs(dx) < 80 || Math.abs(dy) > Math.abs(dx) * 0.4 || dt > 500) return;
    if (state.currentTab !== 'log') return;
    if (state.dirty && !confirm('You have unsaved changes. Switch day and lose them?')) return;
    if (dx > 0 && state.curDay > 1) { state.curDay--; loadCurrentSession(); }
    else if (dx < 0 && state.curDay < 5) { state.curDay++; loadCurrentSession(); }
  }, { passive: true });
}

// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════
function init() {
  const mw = storage.get('maxWeek');
  if (mw) state.maxWeek = mw;

  storage.list('log:').forEach(k => { const v = storage.get(k); if (v) state.allLogs[k] = v; });
  storage.list('bw:').forEach(k => { const v = storage.get(k); if (v) state.allBW[k] = v; });

  if (Object.keys(state.allLogs).length === 0) {
    Object.entries(SEED_DATA).forEach(([day, exercises]) => {
      const key = lk(1, day);
      const log = { exercises, savedAt: new Date().toISOString() };
      try { storage.set(key, log); state.allLogs[key] = log; }
      catch (e) { console.error('Seed write failed:', e); }
    });
    try { storage.set(bk(1, 1), { weight: 138.8 }); state.allBW[bk(1, 1)] = { weight: 138.8 }; } catch {}
    state.curWeek = 2;
  } else {
    const hi = Object.keys(state.allLogs).reduce((mx, k) => {
      const m = k.match(/W(\d+)/);
      return m ? Math.max(mx, +m[1]) : mx;
    }, 0);
    if (hi > state.maxWeek) state.maxWeek = hi;
    state.curWeek = Math.min(state.maxWeek, hi + 1 > state.maxWeek ? state.maxWeek : hi + 1) || 1;
  }

  state.progressEx = ALL_EX.find(n => n !== 'Situps' && n !== 'Close-grip pushups');
  initSessionData();
  attachEventListeners();
  render();
}

document.addEventListener('DOMContentLoaded', init);

// Register service worker for offline use
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
